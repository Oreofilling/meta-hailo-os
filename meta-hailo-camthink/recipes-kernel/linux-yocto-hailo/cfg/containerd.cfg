# Enable CGROUP_FREEZER for container pause/resume support
# Required by containerd/runc for container lifecycle management
CONFIG_CGROUP_FREEZER=y

# Enable overlay filesystem built into kernel (required for containerd)
CONFIG_OVERLAY_FS=y

# BPF support for cgroups
CONFIG_CGROUP_BPF=y
CONFIG_BPF_SYSCALL=y
# Disable BPF-related tracepoints to avoid mem_tracker TRACE_EVENT 18-arg build error (kernel limit 12)
# Note: BPF_EVENTS is auto-derived from these, so we turn them off instead.
# CONFIG_KPROBE_EVENTS is not set
# CONFIG_UPROBE_EVENTS is not set

# CPU cgroup controller (scheduling)
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CFS_BANDWIDTH=y

# Memory cgroup controller
CONFIG_MEMCG=y
CONFIG_MEMCG_SWAP=y