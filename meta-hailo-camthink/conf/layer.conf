# meta-hailo-camthink is the layer (meta-hailo-os is the repo root only)
BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-hailo-camthink"
BBFILE_PATTERN_meta-hailo-camthink = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-hailo-camthink = "10"

LAYERDEPENDS_meta-hailo-camthink = "core meta-hailo-bsp"
LAYERSERIES_COMPAT_meta-hailo-camthink = "kirkstone"
